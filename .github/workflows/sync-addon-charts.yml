name: Sync Addon Charts

on:
  push:
    branches: [main]
    paths:
      - 'addons/**/*.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

env:
  REGISTRY: ${{ vars.PUBLIC_REGISTRY }}  # asia-south1-docker.pkg.dev/managed-k8-481506/kluisz-managed-k8s-public-repository

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Diff the commit, find addon files with new chartVersions, build the
  #         matrix that the sync job fans out over.
  # ─────────────────────────────────────────────────────────────────────────────
  detect:
    name: Detect new addon versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for diff against before SHA

      - uses: mikefarah/yq@v4.44.3

      - name: Detect modified addons with new chartVersions
        id: detect
        env:
          EVENT_NAME:  ${{ github.event_name }}
          BEFORE_SHA:  ${{ github.event.before }}
        run: |
          items='[]'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # ── Manual trigger: include every version in every addon file ──────
            echo "workflow_dispatch: syncing all addon versions"
            while IFS= read -r file; do
              [ -f "$file" ] || continue

              name=$(yq '.name' "$file")
              chart=$(yq '.chart' "$file")
              original_repo=$(yq '.originalRepo // ""' "$file")

              if [ -z "$original_repo" ] || [ "$original_repo" = '""' ]; then
                echo "Skipping $name — internal chart, no originalRepo"
                continue
              fi

              addon_values=$(yq '.compileTimeValues.valuesYAML // ""' "$file")
              mapfile -t versions < <(yq '.versions[].chartVersion' "$file")
              for version in "${versions[@]}"; do
                [ -z "$version" ] && continue
                echo "Queuing: $name @ $version"
                items=$(echo "$items" | jq \
                  --arg f "$file" --arg n "$name" \
                  --arg c "$chart" --arg r "$original_repo" --arg v "$version" \
                  --arg av "$addon_values" \
                  '. + [{"file":$f,"name":$n,"chart":$c,"repo":$r,"version":$v,"addonValues":$av}]')
              done
            done < <(find addons -name '*.yaml' | sort)

          else
            # ── Push trigger: diff pushed commits against the before SHA ───────
            changed=$(git diff --name-only "$BEFORE_SHA" HEAD -- 'addons/**/*.yaml' || true)

            if [ -z "$changed" ]; then
              echo "No addon files changed."
              echo 'matrix=[]' >> "$GITHUB_OUTPUT"
              exit 0
            fi

            for file in $changed; do
              [ -f "$file" ] || continue

              name=$(yq '.name' "$file")
              chart=$(yq '.chart' "$file")
              original_repo=$(yq '.originalRepo // ""' "$file")

              if [ -z "$original_repo" ] || [ "$original_repo" = '""' ]; then
                echo "Skipping $name — internal chart, no originalRepo"
                continue
              fi

              # Versions in current HEAD
              mapfile -t current_versions < <(yq '.versions[].chartVersion' "$file")

              # Versions in the before SHA (empty if file is brand-new)
              mapfile -t prev_versions < <(
                git show "$BEFORE_SHA":"$file" 2>/dev/null \
                  | yq '.versions[].chartVersion' 2>/dev/null \
                || true
              )

              addon_values=$(yq '.compileTimeValues.valuesYAML // ""' "$file")

              for version in "${current_versions[@]}"; do
                [ -z "$version" ] && continue

                is_new=true
                for prev in "${prev_versions[@]}"; do
                  if [ "$version" = "$prev" ]; then
                    is_new=false
                    break
                  fi
                done

                if $is_new; then
                  echo "New version detected: $name @ $version"
                  items=$(echo "$items" | jq \
                    --arg f "$file" --arg n "$name" \
                    --arg c "$chart" --arg r "$original_repo" --arg v "$version" \
                    --arg av "$addon_values" \
                    '. + [{"file":$f,"name":$n,"chart":$c,"repo":$r,"version":$v,"addonValues":$av}]')
                fi
              done
            done
          fi

          matrix=$(echo "$items" | jq -c '.')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Matrix: $matrix"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: For every (addon, version) pair in the matrix, run tools/sync-chart.
  #         The Go app pulls the upstream chart, extracts images from rendered
  #         workload specs, mirrors them to the kluisz registry via crane, patches
  #         values.yaml with the new image paths, then pushes the modified chart.
  #
  #         fail-fast: false so one addon failure doesn't cancel the others.
  # ─────────────────────────────────────────────────────────────────────────────
  sync:
    name: "${{ matrix.addon.name }} @ ${{ matrix.addon.version }}"
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    # Expose matrix values as env vars — the Go app reads these directly.
    env:
      ADDON_NAME:    ${{ matrix.addon.name }}
      ADDON_CHART:   ${{ matrix.addon.chart }}
      ADDON_REPO:    ${{ matrix.addon.repo }}
      ADDON_VERSION: ${{ matrix.addon.version }}
      ADDON_FILE:    ${{ matrix.addon.file }}
      ADDON_COMPILE_VALUES:  ${{ matrix.addon.addonValues }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/sync-chart/go.sum

      # ── GCP auth ────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Writes a credential helper entry to ~/.docker/config.json; both crane
      # (authn.DefaultKeychain) and the Helm SDK registry client read from there.
      - name: Configure Docker credential helper for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # ── Run sync-chart Go app ────────────────────────────────────────────────
      # Pulls the upstream chart, extracts images from rendered workload specs,
      # mirrors them to the kluisz registry via crane (no Docker daemon needed),
      # patches values.yaml with new image paths, then pushes the modified chart.
      - name: Sync chart
        working-directory: tools/sync-chart
        run: go run .

      # ── Job summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          namespace=$(yq '.namespace' "$ADDON_FILE" 2>/dev/null || echo "default")

          echo "## $ADDON_NAME @ $ADDON_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Chart:** \`oci://$REGISTRY/$ADDON_CHART:$ADDON_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Install" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "helm install $ADDON_NAME \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  oci://$REGISTRY/$ADDON_CHART \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --version $ADDON_VERSION \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --namespace $namespace \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --create-namespace" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
