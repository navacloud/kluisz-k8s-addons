name: Sync Addon Charts

on:
  push:
    branches: [main]
    paths:
      - 'addons/**/*.yaml'
  workflow_dispatch:
    inputs:
      sync_all:
        description: 'Build and push all addon versions'
        required: false
        default: 'true'
        type: choice
        options: ['true']

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

env:
  REGISTRY: ${{ vars.PUBLIC_REGISTRY }}  # asia-south1-docker.pkg.dev/managed-k8-481506/kluisz-managed-k8s-public-repository

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Diff the commit, find addon files with new chartVersions, build the
  #         matrix that the sync job fans out over.
  # ─────────────────────────────────────────────────────────────────────────────
  detect:
    name: Detect new addon versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for diff against before SHA

      - uses: mikefarah/yq@v4.44.3

      - name: Detect modified addons with new chartVersions
        id: detect
        env:
          EVENT_NAME:  ${{ github.event_name }}
          BEFORE_SHA:  ${{ github.event.before }}
        run: |
          items='[]'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # ── Manual trigger: include every version in every addon file ──────
            echo "workflow_dispatch: syncing all addon versions"
            while IFS= read -r file; do
              [ -f "$file" ] || continue

              name=$(yq '.name' "$file")
              chart=$(yq '.chart' "$file")
              original_repo=$(yq '.originalRepo // ""' "$file")

              if [ -z "$original_repo" ] || [ "$original_repo" = '""' ]; then
                echo "Skipping $name — internal chart, no originalRepo"
                continue
              fi

              mapfile -t versions < <(yq '.versions[].chartVersion' "$file")
              for version in "${versions[@]}"; do
                [ -z "$version" ] && continue
                echo "Queuing: $name @ $version"
                items=$(echo "$items" | jq \
                  --arg f "$file" --arg n "$name" \
                  --arg c "$chart" --arg r "$original_repo" --arg v "$version" \
                  '. + [{"file":$f,"name":$n,"chart":$c,"repo":$r,"version":$v}]')
              done
            done < <(find addons -name '*.yaml' | sort)

          else
            # ── Push trigger: diff pushed commits against the before SHA ───────
            changed=$(git diff --name-only "$BEFORE_SHA" HEAD -- 'addons/**/*.yaml' || true)

            if [ -z "$changed" ]; then
              echo "No addon files changed."
              echo 'matrix=[]' >> "$GITHUB_OUTPUT"
              exit 0
            fi

            for file in $changed; do
              [ -f "$file" ] || continue

              name=$(yq '.name' "$file")
              chart=$(yq '.chart' "$file")
              original_repo=$(yq '.originalRepo // ""' "$file")

              if [ -z "$original_repo" ] || [ "$original_repo" = '""' ]; then
                echo "Skipping $name — internal chart, no originalRepo"
                continue
              fi

              # Versions in current HEAD
              mapfile -t current_versions < <(yq '.versions[].chartVersion' "$file")

              # Versions in the before SHA (empty if file is brand-new)
              mapfile -t prev_versions < <(
                git show "$BEFORE_SHA":"$file" 2>/dev/null \
                  | yq '.versions[].chartVersion' 2>/dev/null \
                || true
              )

              for version in "${current_versions[@]}"; do
                [ -z "$version" ] && continue

                is_new=true
                for prev in "${prev_versions[@]}"; do
                  if [ "$version" = "$prev" ]; then
                    is_new=false
                    break
                  fi
                done

                if $is_new; then
                  echo "New version detected: $name @ $version"
                  items=$(echo "$items" | jq \
                    --arg f "$file" --arg n "$name" \
                    --arg c "$chart" --arg r "$original_repo" --arg v "$version" \
                    '. + [{"file":$f,"name":$n,"chart":$c,"repo":$r,"version":$v}]')
                fi
              done
            done
          fi

          matrix=$(echo "$items" | jq -c '.')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Matrix: $matrix"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: For every (addon, version) pair in the matrix:
  #           1. Pull the upstream Helm chart
  #           2. Extract all container images
  #           3. Mirror images to kluisz registry (docker pull → retag → push)
  #           4. Patch chart values to reference kluisz registry
  #           5. Repackage and push chart to kluisz OCI registry
  #
  #         fail-fast: false so one addon failure doesn't cancel the others.
  # ─────────────────────────────────────────────────────────────────────────────
  sync:
    name: "${{ matrix.addon.name }} @ ${{ matrix.addon.version }}"
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    # Expose matrix values as env vars so they are never interpolated directly
    # into shell commands (prevents injection from unexpected chars in YAML values).
    env:
      ADDON_NAME:    ${{ matrix.addon.name }}
      ADDON_CHART:   ${{ matrix.addon.chart }}
      ADDON_REPO:    ${{ matrix.addon.repo }}
      ADDON_VERSION: ${{ matrix.addon.version }}
      ADDON_FILE:    ${{ matrix.addon.file }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      # ── GCP auth (same pattern as kluisz-csi-driver) ───────────────────────
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker and Helm for Artifact Registry
        run: |
          gcloud auth configure-docker gcr.io --quiet
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet
          gcloud auth print-access-token | \
            helm registry login -u oauth2accesstoken --password-stdin \
            asia-south1-docker.pkg.dev

      # ── Pull upstream chart ─────────────────────────────────────────────────
      - name: Pull chart from upstream repo
        run: |
          helm repo add addon-repo "$ADDON_REPO" --force-update
          helm pull "addon-repo/$ADDON_CHART" \
            --version "$ADDON_VERSION" \
            --untar --untardir ./chart

      # ── Extract container images from rendered templates ────────────────────
      - name: Extract container images
        id: images
        run: |
          chart_dir="./chart/$ADDON_CHART"

          images=$(helm template probe "$chart_dir" \
            --skip-crds \
            --set installCRDs=true \
            --set crds.enabled=false \
            2>/dev/null \
            | grep -oP '(?m)(?<=image: )[^\s"]+' \
            | sort -u \
            | grep ':' \
            | grep -v '{{' \
            || true)

          if [ -z "$images" ]; then
            echo "Warning: no images extracted — chart may need cluster context."
          else
            echo "Extracted images:"
            echo "$images"
          fi

          { echo "list<<EOF"; echo "$images"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      # ── Mirror images: pull upstream → retag → push to kluisz registry ─────
      - name: Mirror images to kluisz registry
        run: |
          while IFS= read -r src; do
            [ -z "$src" ] && continue

            # quay.io/jetstack/cert-manager-controller:v1.19.2
            #   tag  → v1.19.2
            #   name → cert-manager-controller  (last path component only)
            tag="${src##*:}"
            image_name="${src%:*}"
            image_name="${image_name##*/}"

            dst="$REGISTRY/${image_name}:${tag}"

            echo "Mirroring: $src → $dst"
            docker pull "$src"
            docker tag  "$src" "$dst"
            docker push "$dst"
          done <<< "${{ steps.images.outputs.list }}"

      # ── Patch values.yaml to reference kluisz registry ─────────────────────
      - name: Patch chart values to use kluisz registry
        run: |
          python3 - <<PYEOF
          import re, pathlib, sys, os

          chart    = os.environ["ADDON_CHART"]
          registry = os.environ["REGISTRY"]
          path     = pathlib.Path(f"./chart/{chart}/values.yaml")

          if not path.exists():
              print("No values.yaml found — nothing to patch.")
              sys.exit(0)

          text = path.read_text()

          # 1. Replace standalone registry: fields pointing to an external registry.
          #    e.g.  registry: quay.io  →  registry: asia-south1-.../...
          text = re.sub(
              r'(?m)^(\s*registry:\s*)(?!asia-south1)[a-zA-Z0-9][a-zA-Z0-9\-\.]+\.[a-zA-Z]{2,}',
              rf'\g<1>{registry}',
              text,
          )

          # 2. Replace repository: fields that embed a registry prefix + path.
          #    e.g.  repository: quay.io/jetstack/cert-manager-controller
          #       →  repository: asia-south1-.../cert-manager-controller
          def patch_repo(m):
              val = m.group(1)
              parts = val.split('/')
              if len(parts) >= 2 and '.' in parts[0]:
                  return f"repository: {registry}/{parts[-1]}"
              return m.group(0)

          text = re.sub(r'repository:\s+(\S+)', patch_repo, text)

          path.write_text(text)
          print(f"Patched values.yaml for {chart}.")
          PYEOF

      # ── Repackage and push the modified chart to kluisz OCI registry ────────
      - name: Repackage and push chart to kluisz OCI registry
        run: |
          helm package "./chart/$ADDON_CHART" --version "$ADDON_VERSION"

          helm push "${ADDON_CHART}-${ADDON_VERSION}.tgz" "oci://$REGISTRY"

          echo "Pushed chart: oci://$REGISTRY/$ADDON_CHART:$ADDON_VERSION"

      # ── Job summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          namespace=$(yq '.namespace' "$ADDON_FILE" 2>/dev/null || echo "default")

          echo "## $ADDON_NAME @ $ADDON_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Images mirrored to:** \`$REGISTRY/<image-name>:<tag>\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Chart:** \`oci://$REGISTRY/$ADDON_CHART:$ADDON_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Install" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "helm install $ADDON_NAME \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  oci://$REGISTRY/$ADDON_CHART \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --version $ADDON_VERSION \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --namespace $namespace \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --create-namespace" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
