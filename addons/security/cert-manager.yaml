name: cert-manager
description: "Automates the management and issuance of TLS certificates in Kubernetes"
category: SECURITY
namespace: cert-manager
chart: cert-manager
originalRepo: "oci://quay.io/jetstack/charts/cert-manager:v1.20.0"
defaultValues:
  installCRDs: "true"
  crds.enabled: "true"
  crds.keep: "true"
  replicaCount: "1"
  webhook.replicaCount: "1"
  cainjector.replicaCount: "1"
  prometheus.enabled: "true"
  prometheus.servicemonitor.enabled: "false"
  global.leaderElection.namespace: "cert-manager"
versions:
  - version: "v1.20.0"
    chartVersion: "v1.20.0"
    minK8sVersion: "1.31"
    maxK8sVersion: "1.35"
  - version: "v1.19.2"
    chartVersion: "v1.19.2"
    minK8sVersion: "1.31"
    maxK8sVersion: "1.35"
